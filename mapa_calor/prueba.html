<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Prueba de suavizado del mapa de calor</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }
    </style>
</head>
<body>
    <iframe id="mapa" src="index.html" title="Mapa de calor de prueba"></iframe>

    <script>
        const mapaIframe = document.getElementById('mapa');

        mapaIframe.addEventListener('load', function () {
            const ventanaMapa = mapaIframe.contentWindow;
            const mapaLeaflet = ventanaMapa.map;
            const capaCalor = ventanaMapa.layer_Siniestrosmapa_calortodoshastaenero_3;

            if (!mapaLeaflet || !capaCalor || typeof capaCalor.setOptions !== 'function') {
                console.error('No fue posible localizar el mapa o la capa de calor original.');
                return;
            }

            function ajustarCalorAlZoom() {
                const zoom = mapaLeaflet.getZoom();
                let radius = 40;
                let blur = 30;

                if (zoom === 14) {
                    radius = 46;
                    blur = 34;
                } else if (zoom === 15) {
                    radius = 54;
                    blur = 38;
                } else if (zoom === 16) {
                    radius = 64;
                    blur = 44;
                } else if (zoom >= 17) {
                    radius = 78;
                    blur = 52;
                }

                capaCalor.setOptions({
                    radius: radius,
                    blur: blur,
                    maxZoom: 17,
                    minOpacity: 0.15,
                    gradient: {
                        0.00: '#ffffb2',
                        0.25: '#fed976',
                        0.50: '#feb24c',
                        0.70: '#fd8d3c',
                        0.85: '#f03b20',
                        1.00: '#bd0026'
                    }
                });

                if (typeof capaCalor.redraw === 'function') {
                    capaCalor.redraw();
                }
            }

            ajustarCalorAlZoom();
            mapaLeaflet.on('zoomend', ajustarCalorAlZoom);
        });
    </script>
</body>
</html>

<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Prueba de suavizado del mapa de calor</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }
    </style>
</head>
<body>
    <iframe id="mapa" src="index.html" title="Mapa de calor de prueba"></iframe>

    <script>
        const mapa = document.getElementById('mapa');

        mapa.addEventListener('load', function () {
            const ventanaMapa = mapa.contentWindow;
            const capaCalor = ventanaMapa.layer_Siniestrosmapa_calortodoshastaenero_3;

            if (!capaCalor || typeof capaCalor.setOptions !== 'function') {
                console.error('No fue posible localizar la capa de calor del mapa original.');
                return;
            }

            capaCalor.setOptions({
                radius: 40,
                blur: 30,
                maxZoom: 17,
                minOpacity: 0.15
            });

            if (typeof capaCalor.redraw === 'function') {
                capaCalor.redraw();
            }
        });
    </script>
</body>
</html>
